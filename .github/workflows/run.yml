name: Run Trading Bot Continuous

on:
  workflow_dispatch:

jobs:
  run-bot-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script in Smart Loop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Starting the auto-restarting trading loop..."
          start_time=$(date +%s)
          
          while true; do
            current_time=$(date +%s)
            elapsed=$((current_time - start_time))
            
            # 5.5 Hours (19800 seconds) poore hote hi naya loop trigger hoga
            if [ $elapsed -gt 19800 ]; then
              echo "5.5 Hours reached. Triggering next session..."
              curl -X POST \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${{ github.repository }}/actions/workflows/run_bot.yml/dispatches \
                -d '{"ref":"main"}'
              exit 0
            fi
            
            python bot.py
            echo "Scan complete. Waiting 10 minutes..."
            sleep 600
          done
          

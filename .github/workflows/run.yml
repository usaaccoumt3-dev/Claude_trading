name: Trading Bot

on:
  schedule:
    - cron: '0 */6 * * *'  # Har 6 ghante baad chalu hoga
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Run bot
        run: python bot.py
        

name: Run Trading Bot Continuous

on:
  workflow_dispatch:

jobs:
  run-bot-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script in 10 Minute Loop
        run: |
          echo "Starting the endless background trading loop..."
          while true; do
            python bot.py
            echo "Scan complete. Waiting exactly 10 minutes for the next scan..."
            sleep 600
          done
          

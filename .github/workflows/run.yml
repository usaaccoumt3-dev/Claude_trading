name: Run Trading Bot Continuous

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Taake aap manually b button daba kar start kar sako

jobs:
  run-bot-loop:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ccxt pandas numpy requests

    - name: Run Script in Smart Loop
      run: |
        echo "Starting the auto-restarting trading loop..."
        python bot.py
        
